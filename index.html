<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bestellapp</title>
    <link rel="icon" type="image/png" href="./assets/icons/favicon-cyber.png" />

    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/molecules/buttons.css" />
    <link rel="stylesheet" href="./css/molecules/footer.css" />
    <link rel="stylesheet" href="./css/molecules/impressum.css" />
    <link rel="stylesheet" href="./css/molecules/orderbar.css" />
    <link rel="stylesheet" href="./css/molecules/assets.css" />
    <link rel="stylesheet" href="./css/molecules/fonts.css" />
    <link rel="stylesheet" href="./css/molecules/style.css" />

    <script src="./js/db.js"></script>
    <script src="./js/templates.js"></script>
    <script src="./js/script.js"></script>
  </head>
  <body onload="renderProducts()">
    <header class="page_header">
      <div class="page_header_bar">
        <a class="page_header_brand" href="index.html" aria-label="BestellApp Startseite">
          <span>BestellApp</span>
          <small>Cyberspace</small>
        </a>

        <input class="page_header_toggle" id="page_header_toggle" type="checkbox" />
        <label class="page_header_menu_button" for="page_header_toggle" aria-label="Navigation öffnen">
          <span></span>
          <span></span>
          <span></span>
        </label>

        <nav class="page_header_nav" aria-label="Hauptnavigation">
          <label class="page_header_close" for="page_header_toggle" aria-label="Navigation schließen">x</label>
          <div class="page_header_links">
            <a href="index.html">Start</a>
            <a href="#implantat">Implantate</a>
            <a href="#favorites">Favoriten</a>
            <a href="#contact">Kontakt</a>
          </div>
        </nav>
      </div>

      <section class="page_header_hero" aria-label="Cyberpunk Produktwelt"></section>
    </header>
    <main>
      <section class="products_intro" aria-labelledby="products_intro_title">
        <section class="products_intro_head">
          <img class="products_intro_avatar" src="./assets/images/cybergehirn.png" alt="Cyber Gehirn" />
          <div class="products_intro_title_row">
            <h2 id="products_intro_title">Cyberspace Produkte</h2>
            <p class="products_intro_rating" aria-label="Bewertung 4,8 von 317 Bewertungen">
              <span class="products_intro_rating_star" aria-hidden="true">★</span>
              <strong>4,8</strong>
              <small>(317)</small>
            </p>
          </div>

          <nav class="products_intro_categories" aria-label="Produktkategorien">
            <a class="products_intro_category" href="#augmentierungen">Augmentierungen</a>
            <a class="products_intro_category" href="#enhancements">Enhancements</a>
            <a class="products_intro_category" href="#implantate">Implantate</a>
          </nav>

          <div class="products_intro_banner">
            <p>
              <span>Upgrade yourself.</span>
              <span>Erweitere deine Grenzen.</span>
            </p>
          </div>
        </section>

        <section class="section_title_bar" aria-labelledby="augmentations_title">
          <div class="section_title_bar_inner">
            <h3 id="augmentations_title">Augmentierungen</h3>
          </div>
        </section>

        <div class="products_intro_content">
          <section class="augmentations" id="augmentierungen" aria-labelledby="augmentations_title">
            <div id="products_content"></div>
          </section>
        </div>

        <section class="section_title_bar" aria-labelledby="enhancements_title">
          <div class="section_title_bar_inner">
            <h3 id="enhancements_title">Enhancements</h3>
          </div>
        </section>

        <div class="products_intro_content">
          <section class="enhancements" id="enhancements" aria-labelledby="enhancements_title">
            <div id="enhancements_content"></div>
          </section>
        </div>

        <section class="section_title_bar" aria-labelledby="implants_title">
          <div class="section_title_bar_inner">
            <h3 id="implants_title">Implantate</h3>
          </div>
        </section>

        <div class="products_intro_content">
          <section class="implants" id="implantate" aria-labelledby="implants_title">
            <div id="implants_content"></div>
          </section>
        </div>
      </section>
    </main>
  </body>
</html>
